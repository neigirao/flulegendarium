    <!-- Enhanced Critical CSS for better FCP and LCP -->
    <style>
      /* Critical CSS for initial paint - Enhanced */
      :root {
        --flu-grena: #800020;
        --flu-verde: #10b981;
      }
      
      * {
        box-sizing: border-box;
      }
      
      body { 
        margin: 0; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        background: linear-gradient(to bottom, #10b98150, #ffffff);
        min-height: 100vh;
        line-height: 1.6;
        color: #1f2937;
        font-display: swap;
      }
      
      .critical-loading { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh;
        flex-direction: column;
        gap: 1rem;
      }
      
      .critical-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top: 4px solid var(--flu-grena);
        border-radius: 50%;
        animation: critical-spin 1s linear infinite;
      }
      
      .critical-logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-bottom: 1rem;
      }
      
      .critical-text {
        color: var(--flu-grena);
        font-weight: 600;
        font-size: 1.1rem;
      }
      
      @keyframes critical-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Prevent layout shift */
      .game-container {
        min-height: 600px;
        contain: layout style paint;
      }
      
      .player-image-container {
        aspect-ratio: 1;
        min-height: 300px;
        contain: layout style paint;
      }
      
      /* Optimize font rendering */
      .font-loading {
        font-display: swap;
        text-rendering: optimizeSpeed;
      }
      
      /* Reduce CLS */
      img {
        max-width: 100%;
        height: auto;
      }
      
      [loading="lazy"] {
        opacity: 0;
        transition: opacity 0.3s;
      }
      
      [loading="lazy"].loaded {
        opacity: 1;
      }
      
      /* Performance optimizations */
      .will-change-transform {
        will-change: transform;
      }
      
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
        perspective: 1000px;
      }
    </style>
